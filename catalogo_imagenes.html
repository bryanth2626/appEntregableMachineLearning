<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/detector_imagen.css">
  <title>Reconocimiento de imágenes</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

  
</head>

<body>

  <h1>Reconocimiento de imágenes con ML5</h1>

  <!-- MINIATURAS -->
  <div class="miniaturas">

    <img src="images/perro_borroso.jpg"
    onclick="cargarImagen('images/perro_borroso.jpg')">

    <img src="images/gato.jpg"
    onclick="cargarImagen('images/gato.jpg')">

    <img src="images/panda.jpg"
    onclick="cargarImagen('images/panda.jpg')">

    <img src="images/bosque.jpg"
    onclick="cargarImagen('images/bosque.jpg')">

    <img src="images/mono.jpg"
    onclick="cargarImagen('images/mono.jpg')">

  </div>

  <br>

  <input type="text" id="descripcion"
  placeholder="Descripción">

  <input type="text" id="confianza"
  placeholder="Confianza">

  <script>

    let classifier

    let img

    let confianzaActual = 0

    function preload(){

      // cargar modelo IA
      classifier =
      ml5.imageClassifier("MobileNet")

    }

    function setup(){

      createCanvas(400,400)
      // Establece un color de fondo gris al canva
      background(220)

    }

    function draw(){

      background(220)

      // mostrar imagen
      if(img){

        image(img,0,0,width,height)

      }

      // si confianza es menor a 50
      if(confianzaActual < 50 && img){

        fill(255,0,0)

        textSize(150)

        textAlign(CENTER,CENTER)

        text("?", width/2, height/2)

      }

    }

    // cargar imagen
    function cargarImagen(ruta){

      loadImage(ruta, function(imagen){

        img = imagen

        // clasificar imagen
        classifier.classify(img, gotResult)

      })

    }

    // resultados IA
    function gotResult(results){

      console.log(results)

      let descripcion =
      results[0].label

      let confianza =
      (results[0].confidence * 100).toFixed(2)

      confianzaActual = confianza

      // mostrar descripcion
      document.getElementById("descripcion").value =
      descripcion

      // mostrar confianza
      document.getElementById("confianza").value =
      confianza + "%"

    }

  </script>

</body>
</html>
