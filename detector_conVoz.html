<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

</head>

<body>

<h1>Detector de Objetos</h1>

<p id="resultado">Esperando...</p>

<script>

let modelo;
let video;

let resultado = "";
let confianza = 0;
let ultimaPalabra = "";


/* El modelo de Teachable Machine utiliza carga asíncrona.
Por eso empleé async y await en setup(), para esperar que
el modelo cargue correctamente antes de empezar a detectar objetos. */


// Prepara el programa: crea la cámara, el canvas y carga el modelo.
async function setup(){

  createCanvas(640,480);

  video = createCapture(VIDEO);
  video.size(640,480);
  video.hide();

  const modelURL = "modelo/model.json";
  const metadataURL = "modelo/metadata.json";

  // await: Espera hasta terminar de cargar el modelo antes de continuar.
  modelo = await tmImage.load(
    modelURL,
    metadataURL
  );

  console.log("MODELO TM CARGADO");

  clasificarVideo();

}

// Muestra la cámara y los resultados en pantalla.

function draw(){

  image(video,0,0,width,height);

  fill(255,0,0);
  textSize(25);

  text(
    resultado +
    " " +
    confianza +
    "%",
    20,
    40
  );

}

// Analiza la imagen, detecta el objeto y actualiza el resultado.

async function clasificarVideo(){

  // Le envía una imagen de la cámara al modelo.
  const prediction =
  // .elt obtiene el elemento real del video para que Teachable Machine pueda analizar la imagen capturada por la cámara.
  await modelo.predict(
    video.elt
  );

  let mejor =
  prediction[0];

  // Recorre todas las predicciones del modelo para encontrar la que tiene la mayor probabilidad.
  // length: Cantidad de elementos.
  for(let i=1;i<prediction.length;i++){

    if(
      prediction[i].probability >
      mejor.probability
    ){
      mejor =
      prediction[i];
    }

  }
  // Nombre de la clase es el nombre que puse en Teachable Machine.

  resultado =
  mejor.className;

  confianza =
  (
    mejor.probability * 100
  ).toFixed(2);

  document.getElementById(
    "resultado"
  ).innerHTML =
  resultado +
  " - " +
  confianza +
  "%";

  // Controla cuándo debe hablar la voz.

  if(confianza > 50){

    // ¿El objeto detectado es diferente al último que se dijo?

    if(resultado != ultimaPalabra){

      let voz =
      new SpeechSynthesisUtterance(
        resultado
      );

      voz.lang = "es-ES";


      //Sistema del navegador que convierte texto en voz.
      speechSynthesis.speak(
        voz
      );

      ultimaPalabra =
      resultado;

    }

  }

  console.log(prediction);
  // Ejecutar algo después de cierto tiempo.
  setTimeout(
    clasificarVideo,
    300
  );

  //No utilicé draw pq cargaria 60 veces pro segundo el modelo, lo que no es necesario. En cambio, con setTimeout() controlo cada cuanto tiempo se analiza la imagen.

}

</script>

</body>
</html>
