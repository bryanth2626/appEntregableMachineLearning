<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

</head>

<body>

<h1>Detector de Objetos</h1>

<p id="resultado">Esperando...</p>

<script>

let modelo;
let video;

let resultado = "";
let confianza = 0;
let ultimaPalabra = "";

async function setup(){

  createCanvas(640,480);

  video = createCapture(VIDEO);
  video.size(640,480);
  video.hide();

  const modelURL = "modelo/model.json";
  const metadataURL = "modelo/metadata.json";

  modelo = await tmImage.load(
    modelURL,
    metadataURL
  );

  console.log("MODELO TM CARGADO");

  clasificarVideo();

}

function draw(){

  image(video,0,0,width,height);

  fill(255,0,0);
  textSize(25);

  text(
    resultado +
    " " +
    confianza +
    "%",
    20,
    40
  );

}

async function clasificarVideo(){

  const prediction =
  await modelo.predict(
    video.elt
  );

  let mejor =
  prediction[0];

  for(let i=1;i<prediction.length;i++){

    if(
      prediction[i].probability >
      mejor.probability
    ){
      mejor =
      prediction[i];
    }

  }

  resultado =
  mejor.className;

  confianza =
  (
    mejor.probability * 100
  ).toFixed(2);

  document.getElementById(
    "resultado"
  ).innerHTML =
  resultado +
  " - " +
  confianza +
  "%";

  if(confianza > 50){

    if(resultado != ultimaPalabra){

      let voz =
      new SpeechSynthesisUtterance(
        resultado
      );

      voz.lang = "es-ES";

      speechSynthesis.speak(
        voz
      );

      ultimaPalabra =
      resultado;

    }

  }

  console.log(prediction);

  setTimeout(
    clasificarVideo,
    300
  );

}

</script>

</body>
</html>
