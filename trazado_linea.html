<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Trazado de Línea</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>

  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>

<body>

<script>

let handPose; //modelo deteccion de manos

let video;

let hands = []; // almacena las manos detectadas

function preload(){

  // cargar modelo
  handPose = ml5.handPose();

}

function setup(){

  createCanvas(640,480);

  // activar webcam
  video = createCapture(VIDEO);

  video.size(640,480);

  video.hide();

  // detectar manos
  handPose.detectStart(video, gotHands);

}

function draw(){

  // Guarda la configuración actual del canvas.
  push();

  translate(width,0);

  scale(-1,1);

  image(video,0,0,width,height);

  // SI HAY 2 MANOS
  if(hands.length >= 2){

    // // index_finger_tip: Punta del dedo índice.
    let dedo1 =
    hands[0].index_finger_tip;

    // INDICE MANO 2
    let dedo2 =
    hands[1].index_finger_tip;

    // PUNTOS VERDES
    fill(0,255,0);

    noStroke();
    //width ancho
    circle(width - dedo1.x, dedo1.y, 20);

    circle(width - dedo2.x, dedo2.y, 20);

    // LINEA ROJA
    stroke(255,0,0);

    strokeWeight(5);

    line(
      width - dedo1.x,
      dedo1.y,
      width - dedo2.x,
      dedo2.y
    );

  }

  // restaura la configuración normal del canvas después de haber aplicado el efecto espejo.
  pop();

}
// guardar resultados
function gotHands(results){

  hands = results;

}

</script>

</body>
</html>
